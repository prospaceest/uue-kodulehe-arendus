<script type="text/babel" src="hifi/blog-posts-b.jsx"></script>

<script type="text/babel" src="hifi/blog-posts-b-ru.jsx"></script>

<script type="text/babel" src="hifi/page-info.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "cream",
  "accent": "#b84e2e",
  "showMarquee": true,
  "editHotspots": false
}/*EDITMODE-END*/;

function App() {
  const [pageState, setPageStateRaw] = React.useState({ name: 'home', params: {} });
  const page = pageState.name;
  const setPage = (name, params={}) => setPageStateRaw({ name, params });
  const tweaksHook = (typeof useTweaks === 'function') ? useTweaks(TWEAK_DEFAULTS) : [TWEAK_DEFAULTS, () => {}];
  const tweaks = tweaksHook[0] || TWEAK_DEFAULTS;
  const setTweak = tweaksHook[1] || (()=>{});

  // Force whole-tree re-render on locale change so every page picks up RU/ET.
  const [, setLocaleTick] = React.useState(window.__locale || 'et');
  React.useEffect(() => {
    const h = (e) => setLocaleTick(e.detail.locale);
    window.addEventListener('vp-locale-change', h);
    return () => window.removeEventListener('vp-locale-change', h);
  }, []);

  React.useEffect(()=>{
    document.documentElement.dataset.theme = tweaks.theme;
    document.documentElement.style.setProperty('--accent', tweaks.accent);
  }, [tweaks.theme, tweaks.accent]);

  React.useEffect(()=>{
    window.scrollTo(0,0);
  }, [page]);

  const PageComp = {
    home: HomePage,
    catalog: CatalogPage,
    category: CategoryPage,
    product: ProductPage,
    cart: CartPage,
    contact: ContactPage,
    about: AboutProductsPage,
    checkout: CheckoutPage,
    'order-confirmed': OrderConfirmedPage,
    inspiration: InspirationPage,
    project: ProjectPage,
    blog: BlogPage,
    post: PostPage,
    b2b: B2BPage,
    login: LoginPage,
    account: AccountPage,
    faq: FaqPage,
    shipping: ShippingPage,
    warranty: WarrantyPage,
    legal: LegalPage,
    search: SearchPage,
    notfound: NotFoundPage,
  }[page] || HomePage;

  // Use category in place of catalog secondary nav
  const cartCount = 3;

  return (
    <>
      <LogoSprite/>
      <Header page={page} setPage={setPage} cartCount={cartCount}/>
      <PageComp setPage={setPage} tweaks={tweaks} params={pageState.params}/>
      <Footer setPage={setPage}/>

      {/* Dev-page-picker: ainult kui ?dev=1 query param URL-is */}
      {new URLSearchParams(window.location.search).get('dev') === '1' && (
      <div style={{position:'fixed', bottom:18, left:18, zIndex:100, background:'var(--paper)', border:'1.5px solid var(--ink)', padding:'8px 10px', display:'flex', gap:6, alignItems:'center', fontFamily:'JetBrains Mono, monospace', fontSize:11, textTransform:'uppercase', boxShadow:'0 4px 18px rgba(0,0,0,0.08)'}}>
        <span style={{color:'var(--muted)', marginRight:4}}>DEV · Lehed:</span>
        {[['home','Avaleht'],['catalog','Pood'],['category','Lae'],['category-2','Põrand'],['category-3','Liistud'],['category-4','Sein'],['product','Toode'],['about','Toodetest'],['inspiration','Inspir.'],['project','Projekt'],['blog','Blogi'],['post','Artikkel'],['cart','Korv'],['checkout','Checkout'],['order-confirmed','Tellitud'],['b2b','B2B'],['login','Logi'],['account','Konto'],['faq','KKK'],['shipping','Tarne'],['warranty','Garantii'],['legal','Tingim.'],['search','Otsing'],['notfound','404'],['contact','Kontakt']].map(([id,l])=>{
          const catMap = {'category':'Laeprofiilid','category-2':'Põrandaprofiilid','category-3':'Põrandaliistud','category-4':'Seina peiteprofiilid'};
          const isCat = catMap[id];
          const realId = isCat ? 'category' : id;
          const isActive = isCat ? (page==='category' && pageState.params?.category===catMap[id]) : (page===id);
          return (
            <button key={id} onClick={()=>setPage(realId, isCat?{category:catMap[id]}:{})} style={{padding:'5px 9px', fontFamily:'inherit', fontSize:10, textTransform:'uppercase', cursor:'pointer', border:'1px solid var(--ink)', background: isActive?'var(--ink)':'transparent', color: isActive?'var(--paper)':'var(--ink)'}}>{l}</button>
          );
        })}
      </div>
      )}

      {typeof TweaksPanel !== 'undefined' && (
        <TweaksPanel title="Tweaks">
          <TweakSection title="Tema">
            <TweakSelect label="Värviskeem" value={tweaks.theme} onChange={v=>setTweak('theme', v)} options={[
              {value:'cream', label:'Cream (warm off-white)'},
              {value:'white', label:'Pure white'},
              {value:'mono', label:'Mono (no accent)'},
              {value:'dark', label:'Dark mode'},
            ]}/>
            <TweakColor label="Aktsentvärv" value={tweaks.accent} onChange={v=>setTweak('accent', v)} options={['#b84e2e','#0a0a0a','#2a6f4a','#3a4f8a','#c89a3a']}/>
            <TweakToggle label="Marquee riba" value={tweaks.showMarquee} onChange={v=>setTweak('showMarquee', v)}/>
            <TweakToggle label="Lohista hotspots" value={tweaks.editHotspots} onChange={v=>setTweak('editHotspots', v)}/>
          </TweakSection>
        </TweaksPanel>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
